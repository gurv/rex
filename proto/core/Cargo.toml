[package]
name = "proto_core"
version = "0.1.0"
publish = false

edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
proto_pdk_api = { path = "../pdk-api", features = [
    "schematic",
] }
rex_proto_shim = { path = "../../crates/shim" }
rex_system_env = { path = "../../crates/system-env" }
rex_version_spec = { path = "../../crates/version-spec", features = [
    "schematic",
] }
rex_warpgate = { path = "../../crates/warpgate", features = [
    "miette",
    "schematic",
] }
clap = { workspace = true, optional = true }
convert_case = "0.10.0"
dotenvy = "0.15.7"
indexmap = { workspace = true }
iocraft = { workspace = true }
miette = { workspace = true }
minisign-verify = "0.2.5"
once_cell = { workspace = true }
oci-client = { workspace = true }
docker_credential = { workspace = true }
regex = { workspace = true }
reqwest = { workspace = true }
rustc-hash = { workspace = true }
scc = { workspace = true }
schematic = { workspace = true, features = [
    "config",
    "env",
    "toml",
    "type_indexmap",
    "type_regex",
    "type_url",
    "validate",
] }
semver = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
shell-words = { workspace = true }
starbase_archive = { workspace = true }
starbase_console = { workspace = true, features = ["ui"] }
starbase_shell = { workspace = true }
starbase_styles = { workspace = true }
starbase_utils = { workspace = true, features = ["fs-lock", "yaml"] }
thiserror = { workspace = true }
tokio = { workspace = true }
toml_edit = { workspace = true }
tracing = { workspace = true }
url = { version = "2.5.8", features = ["serde"] }
uuid = { workspace = true }

[features]
default = []
clap = ["dep:clap"]

test-plugins = []
