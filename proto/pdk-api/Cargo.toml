[package]
name = "proto_pdk_api"
version = "0.1.0"
publish = false

edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
rex_system_env = { path = "../../crates/system-env" }
rex_version_spec = { path = "../../crates/version-spec" }
rex_warpgate_api = { path = "../../crates/warpgate-api" }
derive_setters = { workspace = true }
rustc-hash = { workspace = true }
schematic = { workspace = true, features = [
	"schema",
	"schema_serde",
	"type_semver",
] }
semver = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }

[features]
default = []
schematic = [
	"rex_system_env/schematic",
	"rex_version_spec/schematic",
	"rex_warpgate_api/schematic",
]
