[package]
name = "rex_warpgate"
version = "0.1.0"

edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
rex_system_env = { path = "../system-env" }
rex_warpgate_api = { path = "../warpgate-api" }
async-trait = { workspace = true }
compact_str = { workspace = true }
docker_credential = { workspace = true }
extism = { workspace = true, features = ["http"] }
http-cache-reqwest = { workspace = true }
miette = { workspace = true, optional = true }
oci-client = { workspace = true }
once_cell = { workspace = true }
regex = { workspace = true }
reqwest = { workspace = true, features = ["json", "query", "rustls"] }
reqwest-middleware = { workspace = true, features = [
	"json",
	"query",
	"rustls",
] }
rust-netrc = "0.1.2"
schematic = { workspace = true, optional = true, features = ["schema"] }
scc = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
starbase_archive = { workspace = true }
starbase_shell = { workspace = true }
starbase_styles = { workspace = true }
starbase_utils = { workspace = true, features = ["glob", "net"] }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
ureq = { version = "3.2.0", features = ["rustls", "platform-verifier"] }

[dev-dependencies]
starbase_sandbox = { workspace = true }

[features]
default = []
miette = ["dep:miette"]
schematic = ["dep:schematic", "rex_system_env/schematic", "rex_warpgate_api/schematic"]
